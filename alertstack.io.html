<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title></title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            font-size: 32px;
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #domain, #title {/**/}

        @keyframes dblclick-hint {
            0%   { opacity: 1; transform: scale(1);    background: transparent;                    border-radius: 6px; }
            25%  { opacity: 0.55; transform: scale(0.96); background: rgba(99, 179, 237, 0.18);   border-radius: 6px; }
            50%  { opacity: 1; transform: scale(1);    background: transparent;                    border-radius: 6px; }
            75%  { opacity: 0.55; transform: scale(0.96); background: rgba(99, 179, 237, 0.18);   border-radius: 6px; }
            100% { opacity: 1; transform: scale(1);    background: transparent;                    border-radius: 6px; }
        }

        .dblclick-hinting {
            animation: dblclick-hint 0.45s ease-in-out;
            cursor: pointer;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
</head>

<body>
    <div id="domain"></div>
    <script>
        document.getElementById('domain').textContent = window.location.hostname;
        document.title = window.location.hostname;


        const maxTouchPoints = () => {
            try {
                return window.navigator.maxTouchPoints;
            } catch (e) {
                return 0;
            }
        };

        const attachDoubleClickListener = (divId, callback) => {
            const divElement = document.getElementById(divId);
            if (!divElement) {
                console.error(`div with ID ${divId} not found.`);
                return;
            }
        
            divElement.addEventListener('dblclick', (event) => {
                window.location.href = callback();
            });
        };
        


        function attachDoubleTapListener(divId, callback, doubleTapDelay = 300) {
            let lastTap = 0;
            let tapCount = 0;
            let timeout;
        
            if (maxTouchPoints() == 0) {
                console.log('attachDoubleTapListener no touch points');
                return;
            }
        
            const divElement = document.getElementById(divId);
            if (!divElement) {
                console.error(`div with ID ${divId} not found.`);
                return;
            }
        
            function resetTaps() {
                tapCount = 0;
                clearTimeout(timeout);
            }
        
            divElement.addEventListener(
                'touchend',
                function (event) {
                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTap;
                    if (tapLength < doubleTapDelay && tapLength > 0) {
                        tapCount++;
                        if (tapCount === 2) {
                            resetTaps();
                            window.location.href = callback();
                            return;
                        }
                    } else {
                        tapCount = 1;
                    }
        
                    lastTap = currentTime;
        
                    timeout = setTimeout(resetTaps, doubleTapDelay);
                },
                false
            );
        }
        
    const AUTO_DBLCLICK_DELAY_MS = 5000;

    function triggerAutoDblClick(elementId) {
        const el = document.getElementById(elementId);
        if (!el) return;
        el.classList.add('dblclick-hinting');
        el.addEventListener('animationend', () => {
            el.classList.remove('dblclick-hinting');
            el.dispatchEvent(new MouseEvent('dblclick', { bubbles: true, cancelable: true }));
        }, { once: true });
    }

    setTimeout(() => triggerAutoDblClick('domain'), AUTO_DBLCLICK_DELAY_MS);

    try {
            attachDoubleTapListener('domain', () => 'https://alertstack.io/README.html');
            attachDoubleClickListener('domain', () => 'https://alertstack.io/README.html');
        }
     catch (e) {}

    </script>

</body>

</html>
