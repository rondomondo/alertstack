apiVersion: 1

providers:
  - name: alertstack
    orgId: 1
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards/alertstack
      foldersFromFilesStructure: false
    folder: Alertstack
    folderUid: alertstack
